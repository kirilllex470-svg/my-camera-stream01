<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Моя Онлайн Трансляция</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #111; color: white; padding: 0; margin: 0; }
        h1 { margin-top: 20px; font-size: 24px; }
        .box { font-size: 18px; color: #00ff00; margin: 15px auto; background: #222; padding: 15px; border-radius: 8px; max-width: 600px; }
        #meet-container { width: 100%; height: 80vh; background: #000; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Онлайн Трансляция для Друзей</h1>
    <div id="status" class="box">Подключаемся к трансляции...</div>
    
    <div id="meet-container"></div>

    <script src="https://jit.si"></script>
    <script>
        window.onload = function() {
            // Придумайте свое секретное имя комнаты латиницей
            const roomName = "my-secret-stream-room-2026"; 

            // Проверяем, зашли ли вы как стример
            const isStreamer = window.location.search.includes('stream');
            
            const options = {
                roomName: roomName,
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#meet-container'),
                lang: 'ru',
                configOverwrite: {
                    // Если зашел друг (НЕ стример), у него по умолчанию ВЫКЛЮЧЕНЫ камера и микрофон
                    startWithAudioMuted: !isStreamer,
                    startWithVideoMuted: !isStreamer,
                    // Запрещаем зрителям включать свои камеры
                    constraints: {
                        video: {
                            optional: [],
                            mandatory: {
                                // Зрители не могут транслировать видео
                                disableVideo: !isStreamer 
                            }
                        }
                    }
                },
                interfaceConfigOverwrite: {
                    // Для стримера оставляем все кнопки, для зрителей убираем лишнее
                    TOOLBAR_BUTTONS: isStreamer 
                        ? ['microphone', 'camera', 'hangup', 'fullscreen', 'desktop'] 
                        : ['fullscreen'] // Зрители могут только развернуть на весь экран
                }
            };

            const api = new JitsiMeetExternalAPI("meet.jit.si", options);

            if (isStreamer) {
                document.getElementById('status').innerHTML = "🟢 ВЫ В ЭФИРЕ! Ваша камера включена.<br>Друзья смотрят эфир по обычной ссылке.";
            } else {
                document.getElementById('status').innerHTML = "👀 РЕЖИМ ПРОСМОТРА. Вы смотрите прямую трансляцию.";
            }
        };
    </script>
</body>
</html>
