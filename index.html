<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Просмотр трансляции</title>
    <style>
        body { font-family: Arial; text-align: center; background: #111; color: white; padding: 20px; }
        video { width: 100%; max-width: 800px; background: #000; border-radius: 8px; border: 2px solid #333; margin-top: 15px; }
        .box { font-size: 16px; color: #00ff00; margin: 15px auto; background: #222; padding: 15px; border-radius: 8px; max-width: 500px; text-align: left; }
        textarea { width: 95%; height: 60px; background: #333; color: #00ff00; border: 1px solid #555; margin: 5px 0; word-break: break-all; font-family: monospace; font-size: 12px; }
        button { padding: 8px 15px; font-size: 14px; cursor: pointer; background: #00bcff; border: none; border-radius: 4px; font-weight: bold; color: white; }
    </style>
</head>
<body>

    <h1>Просмотр трансляции</h1>
    
    <div id="setup-box" class="box">
        <p style="margin:0 0 5px 0;">1. Вставьте код от стримера:</p>
        <textarea id="offer-code" placeholder="Вставьте код стримера сюда..."></textarea>
        <button onclick="receiveStream()">Создать ответный код</button>
        
        <div id="answer-zone" style="display:none; margin-top:15px;">
            <p style="margin:0 0 5px 0; color:#00ff00;">2. Скопируйте этот ответ и отправьте стримеру:</p>
            <textarea id="answer-code" readonly onclick="this.select()"></textarea>
        </div>
    </div>

    <video id="remote-video" autoplay playsinline controls></video>

    <script>
        let pc;

        async function compressData(str) {
            const stream = new Blob([str]).stream().pipeThrough(new CompressionStream('gzip'));
            const response = new Response(stream);
            const buffer = await response.arrayBuffer();
            return btoa(String.fromCharCode(...new Uint8Array(buffer)));
        }

        async function decompressData(base64Str) {
            const bytes = Uint8Array.from(atob(base64Str), c => c.charCodeAt(0));
            const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
            return await new Response(stream).text();
        }

        async function receiveStream() {
            let txt = document.getElementById('offer-code').value.trim();
            if(!txt) return alert("Вставьте код!");

            try {
                pc = new RTCPeerConnection({ iceServers: [] });

                pc.ontrack = (event) => {
                    if (event.streams && event.streams[0]) {
                        document.getElementById('remote-video').srcObject = event.streams[0];
                        document.getElementById('setup-box').style.display = 'none';
                    }
                };

                pc.onicecandidate = async (e) => {
                    if (!e.candidate) {
                        let shortAnswer = await compressData(JSON.stringify(pc.localDescription));
                        document.getElementById('answer-code').value = shortAnswer;
                        document.getElementById('answer-zone').style.display = 'block';
                    }
                };

                let decrypted = await decompressData(txt);
                await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(decrypted)));
                await pc.setLocalDescription(await pc.createAnswer());

            } catch (e) { alert("Ошибка обработки кода: " + e.message); }
        }
    </script>
</body>
</html>
