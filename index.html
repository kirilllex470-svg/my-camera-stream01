<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Стрим-Центр для 5 человек</title>
    <style>
        body { font-family: Arial, sans-serif; background: #111; color: white; padding: 20px; text-align: center; }
        h1 { color: #00ff00; margin-bottom: 5px; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        .player-box { background: #222; border: 2px solid #333; border-radius: 10px; padding: 15px; width: 340px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .player-box.main { border-color: #00ff00; }
        .player-box h3 { margin-top: 0; color: #ccc; }
        .player-box.main h3 { color: #00ff00; }
        video { width: 100%; height: 200px; background: #000; border-radius: 6px; border: 1px solid #444; }
        .controls { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
        input { padding: 8px; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; font-size: 13px; }
        button { padding: 8px 12px; background: #00ff00; color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #00cc00; }
        .btn-update { background: #00bcff; color: white; }
        .btn-update:hover { background: #0099cc; }
    </style>
</head>
<body>

    <h1>Стрим-Центр для 5 человек</h1>
    <p>Каждый участник вставляет ссылку на свое видео в свое окошко!</p>
    
    <div class="grid">
        <!-- КАНАЛ 1 (ВЫ) -->
        <div class="player-box main">
            <h3>Игрок 1 (Вы)</h3>
            <video id="video-1" controls autoplay playsinline muted></video>
            <div class="controls">
                <input type="text" id="url-1" placeholder="Вставьте ссылку на ваше видео...">
                <button onclick="playStream(1)">Включить мое видео</button>
            </div>
        </div>

        <!-- КАНАЛ 2 -->
        <div class="player-box">
            <h3>Игрок 2</h3>
            <video id="video-2" controls autoplay playsinline></video>
            <div class="controls">
                <input type="text" id="url-2" placeholder="Вставьте ссылку Друга 2...">
                <button class="btn-update" onclick="playStream(2)">Подключить</button>
            </div>
        </div>

        <!-- КАНАЛ 3 -->
        <div class="player-box">
            <h3>Игрок 3</h3>
            <video id="video-3" controls autoplay playsinline></video>
            <div class="controls">
                <input type="text" id="url-3" placeholder="Вставьте ссылку Друга 3...">
                <button class="btn-update" onclick="playStream(3)">Подключить</button>
            </div>
        </div>

        <!-- КАНАЛ 4 -->
        <div class="player-box">
            <h3>Игрок 4</h3>
            <video id="video-4" controls autoplay playsinline></video>
            <div class="controls">
                <input type="text" id="url-4" placeholder="Вставьте ссылку Друга 4...">
                <button class="btn-update" onclick="playStream(4)">Подключить</button>
            </div>
        </div>

        <!-- КАНАЛ 5 -->
        <div class="player-box">
            <h3>Игрок 5</h3>
            <video id="video-5" controls autoplay playsinline></video>
            <div class="controls">
                <input type="text" id="url-5" placeholder="Вставьте ссылку Друга 5...">
                <button class="btn-update" onclick="playStream(5)">Подключить</button>
            </div>
        </div>
    </div>

    <script>
        function playStream(id) {
            const urlInput = document.getElementById(`url-${id}`).value.trim();
            const videoElement = document.getElementById(`video-${id}`);
            
            if (!urlInput) {
                alert("Пожалуйста, сначала вставьте рабочую ссылку на видеопоток!");
                return;
            }

            // Загружаем ссылку в плеер
            videoElement.src = urlInput;
            videoElement.load();
            
            // Запускаем воспроизведение
            videoElement.play().catch(error => {
                console.log("Автозапуск заблокирован браузером, нажмите Play вручную:", error);
                alert("Ссылка добавлена! Нажмите кнопку воспроизведения (Play) прямо на видео-плеере.");
            });
        }
    </script>

</body>
</html>
