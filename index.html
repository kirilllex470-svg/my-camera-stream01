<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Просмотр без кодов</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: Arial; text-align: center; background: #111; color: white; padding: 20px; }
        video { width: 640px; height: 480px; background: #000; border-radius: 8px; margin-top: 20px; border: 2px solid #333; }
        .box { font-size: 18px; color: #00ff00; margin: 15px auto; background: #222; padding: 15px; border-radius: 8px; max-width: 600px; text-align: center; }
        button { padding: 12px 25px; font-size: 18px; cursor: pointer; background: #00ff00; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Просмотр трансляции</h1>
    <div id="status" class="box">Нажмите кнопку для подключения</div>
    
    <!-- Кнопка нужна, так как браузеры запрещают включать звук без клика пользователя -->
    <button onclick="connect()">Подключиться к трансляции</button>
    <br>
    <video id="remote-video" autoplay playsinline controls></video>

    <script>
        function connect() {
            document.getElementById('status').innerText = "Ищем трансляцию в сети...";
            const peer = new Peer();

            peer.on('open', () => {
                // Подключаемся к той же комнате. 
                // ВАЖНО: Тут должно быть точь-в-точь то же слово, что и в streamer.html!
                const call = peer.call('my-unique-camera-room-2026', new MediaStream());

                call.on('stream', (remoteStream) => {
                    document.getElementById('remote-video').srcObject = remoteStream;
                    document.getElementById('status').innerText = "🟢 Вы в эфире! Приятного просмотра.";
                });
            });

            peer.on('error', (err) => {
                document.getElementById('status').innerText = "Не удалось подключиться. Убедитесь, что стример включил камеру.";
            });
        }
    </script>
</body>
</html>
