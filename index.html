<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Просмотр Трансляции</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #111; color: white; padding: 0; margin: 0; }
        h1 { margin-top: 20px; font-size: 24px; color: #00bcff; }
        .info { font-size: 16px; background: #222; padding: 10px; border-radius: 5px; display: inline-block; margin-top: 10px; }
        #meet-box { width: 100%; height: 80vh; margin-top: 15px; background: #000; }
    </style>
</head>
<body>

    <h1>Прямой эфир друга</h1>
    <div class="info">Режим просмотра. Вы просто смотрите трансляцию.</div>
    
    <!-- Сюда встроится экран трансляции -->
    <div id="meet-box"></div>

    <!-- Загружаем официальный скрипт Jitsi -->
    <script src="https://jit.si"></script>
    <script>
        window.onload = function() {
            // ВАЖНО: Название комнаты должно БЫТЬ ОДИНАКОВЫМ с файлом streamer.html!
            const MY_SECRET_ROOM = "my-private-camera-room-2026"; 

            const options = {
                roomName: MY_SECRET_ROOM,
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#meet-box'),
                lang: 'ru',
                configOverwrite: {
                    // Принудительно ВЫКЛЮЧАЕМ камеру и микрофон у зрителя при входе
                    startWithAudioMuted: true,
                    startWithVideoMuted: true,
                    constraints: {
                        video: {
                            mandatory: {
                                disableVideo: true // Зритель физически не может включить камеру
                            }
                        }
                    }
                },
                interfaceConfigOverwrite: {
                    // Убираем у друзей вообще все кнопки управления, оставляем только "на весь экран"
                    TOOLBAR_BUTTONS: ['fullscreen']
                }
            };
            // Подключаем зрителя
            new JitsiMeetExternalAPI("meet.jit.si", options);
        };
    </script>
</body>
</html>
