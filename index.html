<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Просмотр стрима</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #111; color: white; padding: 20px; }
        video { width: 640px; height: 480px; background: #000; border-radius: 8px; margin-top: 20px; border: 2px solid #333; }
        textarea { width: 95%; height: 70px; background: #333; color: #00ff00; border: 1px solid #555; padding: 8px; font-size: 12px; word-break: break-all; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #00ff00; border: none; border-radius: 5px; font-weight: bold; margin-top: 10px; color: black; }
        .step { background: #222; padding: 15px; margin: 15px auto; max-width: 600px; border-radius: 8px; text-align: left; }
    </style>
</head>
<body>

    <h1>Подключение к трансляции</h1>

    <div class="step">
        <label><strong>Шаг 1:</strong> Вставьте код от стримера:</label>
        <textarea id="offerCode" placeholder="Вставьте код сюда..."></textarea>
        <button onclick="connectToStream()">Создать ответ</button>
    </div>

    <div class="step" id="answerBox" style="display:none;">
        <label><strong>Шаг 2:</strong> Скопируйте этот ответ и отправьте стримеру:</label>
        <textarea id="answerCode" readonly onclick="this.select()"></textarea>
    </div>

    <video id="remote-video" autoplay playsinline controls></video>

    <script>
        const configuration = { iceServers: [{ urls: 'stun:://google.com' }] };
        const pc = new RTCPeerConnection(configuration); 
        
        pc.ontrack = (e) => {
            document.getElementById('remote-video').srcObject = e.streams;
        };

        async function connectToStream() {
            // .replace line fixes the "atob" decoding crash by cleaning up bad chat spaces!
            let text = document.getElementById('offerCode').value.replace(/\s/g, '');
            if (!text) return alert("Вставьте код!");
            
            try {
                const parsed = JSON.parse(atob(text));
                await pc.setRemoteDescription(new RTCSessionDescription(parsed));
                
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                
                pc.onicecandidate = (e) => {
                    if (!e.candidate) {
                        showAnswerCode();
                    }
                };

                setTimeout(() => {
                    if (pc.localDescription) showAnswerCode();
                }, 3000);

            } catch (err) { 
                alert("Ошибка чтения кода! Попробуйте скопировать текст еще раз из чата без лишних символов."); 
                console.error(err);
            }
        }

        function showAnswerCode() {
            const compressedAnswer = btoa(JSON.stringify(pc.localDescription));
            document.getElementById('answerCode').value = compressedAnswer;
            document.getElementById('answerBox').style.display = 'block';
        }
    </script>
</body>
</html>
